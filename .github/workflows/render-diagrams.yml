name: Render Architecture Diagrams

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/render-diagrams.yml
      - docs/diagrams/**
      - README.md

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    concurrency:
      group: render-diagrams-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Install Python dependencies
        run: python -m pip install -r docs/diagrams/requirements.txt

      - name: Render PNG diagrams
        run: python docs/diagrams/architecture.py

      - name: Commit rendered diagrams
        run: |
          if [[ -z "$(ls -1 docs/diagrams/*.png 2>/dev/null)" ]]; then
            echo "No PNG files were generated."
            exit 1
          fi

          git add docs/diagrams/*.png

          if git diff --cached --quiet -- docs/diagrams/*.png; then
            echo "No diagram changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(diagrams): render architecture PNGs [skip ci]"
          git push