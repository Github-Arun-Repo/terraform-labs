name: CodeQL and Secrets

on:
  pull_request:
    paths:
      - applications/**
      - .github/workflows/codeql.yml
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL (Java)
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        service:
          - applications/document-api-service
          - applications/document-processing-service
          - applications/document-review-service
          - applications/user-management-service
          - applications/document-processor
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build with Maven
        working-directory: ${{ matrix.service }}
        run: mvn -B clean verify -DskipTests

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  gitleaks:
    name: Gitleaks (new findings)
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.21.2"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Run gitleaks on PR commit range
        run: |
          set -euo pipefail
          gitleaks git \
            --redact \
            --exit-code 1 \
            --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.sha }}" \
            --report-format sarif \
            --report-path gitleaks.sarif

      - name: Upload gitleaks SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
