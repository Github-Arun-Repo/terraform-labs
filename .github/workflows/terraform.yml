name: Terraform

on:
  pull_request:
    paths:
      - terraform/**
      - .github/workflows/terraform.yml
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  id-token: write
  security-events: write

jobs:
  terraform-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_TO_ASSUME_PLAN: ${{ vars.AWS_ROLE_TO_ASSUME_PLAN }}
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials via OIDC (plan role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME_PLAN }}
          role-session-name: gh-terraform-plan
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Init TFLint
        run: tflint --init

      - name: Run TFLint
        run: tflint --recursive

      - name: Trivy config scan (SARIF)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: config
          scan-ref: terraform
          format: sarif
          output: trivy-terraform.sarif
          exit-code: '1'

      - name: Upload Trivy IaC SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-terraform.sarif

      - name: Terraform plan
        id: plan
        run: |
          terraform plan -no-color -input=false -out=tfplan | tee /tmp/tfplan.txt

      - name: Build PR comment body
        run: |
          {
            echo "### Terraform Plan"
            echo
            echo "\`\`\`terraform"
            sed -n '1,650p' /tmp/tfplan.txt
            echo "\`\`\`"
          } > /tmp/terraform-plan-comment.md

      - name: Sticky PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: terraform-plan
          path: /tmp/terraform-plan-comment.md

  terraform-apply:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    environment: terraform-apply
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_TO_ASSUME_CI: ${{ vars.AWS_ROLE_TO_ASSUME_CI }}
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME_CI }}
          role-session-name: gh-terraform-apply
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan
