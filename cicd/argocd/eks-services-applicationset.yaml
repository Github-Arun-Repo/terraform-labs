apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: eks-services
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: terraform-labs
    app.kubernetes.io/managed-by: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/Github-Arun-Repo/terraform-labs.git
        revision: main
        directories:
          - path: k8s/eks/*
  template:
    metadata:
      name: '{{path.basename}}'
      labels:
        app.kubernetes.io/part-of: terraform-labs
        app.kubernetes.io/managed-by: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: https://github.com/Github-Arun-Repo/terraform-labs.git
        targetRevision: main
        path: '{{path.path}}'
        helm:
          valueFiles:
            - values.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
      ignoreDifferences:
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas
