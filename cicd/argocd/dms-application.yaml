# ArgoCD Application – Document Management Service
#
# This manifest tells ArgoCD to watch the DMS Helm chart in this repository
# and keep the live cluster state in sync with what is committed on the main branch.
#
# How to apply:
#   kubectl apply -f cicd/argocd/dms-application.yaml
#
# The image.tag field in k8s/eks/document-management-service/values.yaml is
# updated automatically by the Jenkins CI pipeline (cicd/jenkins/dms-ci.Jenkinsfile)
# on every successful build.  ArgoCD detects the commit and rolls out the new image.
#
# Prerequisites:
#   1. ArgoCD is installed in the cluster (see k8s/argocd/argocd/).
#   2. The repository URL below matches your actual Git remote.
#   3. If the repository is private, create an ArgoCD repository secret first:
#        argocd repo add https://github.com/your-org/terraform-labs.git \
#          --username <user> --password <token>

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: document-management-service
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: terraform-labs
    app.kubernetes.io/managed-by: argocd
  # Finalizer ensures ArgoCD cleans up managed resources when the Application is deleted
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    # ---------------------------------------------------------------------------
    # Update repoURL to your actual repository before applying this manifest.
    # ---------------------------------------------------------------------------
    repoURL: https://github.com/your-org/terraform-labs.git
    targetRevision: main
    path: k8s/eks/document-management-service

    helm:
      # The primary values file; image.tag is written back by Jenkins CI.
      valueFiles:
        - values.yaml

  destination:
    # Deploy into the same cluster where ArgoCD is running
    server: https://kubernetes.default.svc
    namespace: dms

  syncPolicy:
    automated:
      # Remove resources from the cluster that are no longer in Git
      prune: true
      # Revert any manual changes made directly in the cluster
      selfHeal: true
    syncOptions:
      # Create the target namespace if it does not exist
      - CreateNamespace=true
      # Use server-side apply to handle large/complex resources
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Ignore the replicaCount if an HPA is managing it to avoid constant drift
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
