# ArgoCD Application – Document Processor Service
#
# This manifest tells ArgoCD to watch the Document Processor Helm chart in this repository
# and keep the live cluster state in sync with what is committed on the main branch.
#
# How to apply:
#   kubectl apply -f cicd/argocd/document-processor-application.yaml
#
# Prerequisites:
#   1. ArgoCD is installed in the cluster (see k8s/argocd/argocd/).
#   2. The repository URL below matches your actual Git remote.
#   3. If the repository is private, create an ArgoCD repository secret first.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: document-processor
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: terraform-labs
    app.kubernetes.io/managed-by: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/your-org/terraform-labs.git
    targetRevision: main
    path: k8s/eks/document-processor

    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: document-processor

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
