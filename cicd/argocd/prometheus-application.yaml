# ArgoCD Application – Prometheus (kube-prometheus-stack)
#
# Deploys the full Prometheus monitoring stack into the `monitoring` namespace:
#   - Prometheus Operator
#   - Prometheus (metrics storage & alerting)
#   - Alertmanager
#   - Node Exporter  (node / CPU metrics collected from every EKS node)
#   - kube-state-metrics (pod, deployment, and node health metrics)
#
# How to apply:
#   kubectl apply -f cicd/argocd/prometheus-application.yaml
#
# Prerequisites:
#   1. ArgoCD is installed in the cluster (see k8s/argocd/argocd/).
#   2. The repository URL below matches your actual Git remote.
#   3. A gp3 StorageClass must exist in the cluster (used for Prometheus PVC).
#   4. If the repository is private, register it in ArgoCD first:
#        argocd repo add https://github.com/your-org/terraform-labs.git \
#          --username <user> --password <token>

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: terraform-labs
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/component: observability
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    # ---------------------------------------------------------------------------
    # Update repoURL to your actual repository before applying this manifest.
    # ---------------------------------------------------------------------------
    repoURL: https://github.com/your-org/terraform-labs.git
    targetRevision: main
    path: k8s/prometheus/kube-prometheus-stack

    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # kube-prometheus-stack installs CRDs; ServerSideApply avoids annotation
      # size limits on large CRD manifests
      - ServerSideApply=true
