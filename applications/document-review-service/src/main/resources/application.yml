server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: ${APP_NAME:document-review-service}

# Exposes operational endpoints used by probes, dashboards, and troubleshooting tools.
management:
  # Publishes selected actuator endpoints over HTTP so health and telemetry can be scraped.
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  # Enables endpoint-specific behavior for richer readiness and metric publishing.
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
      probes:
        enabled: ${MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED:true}
  # Adds consistent labels to all metrics so dashboards can filter by service and environment.
  metrics:
    tags:
      application: document-review-service
      environment: ${ENVIRONMENT:local}
  # Samples all traces in local/dev to make end-to-end request paths easy to inspect.
  tracing:
    sampling:
      probability: 1.0

aws:
  region: ${AWS_REGION:eu-central-1}
  endpoint-override: ${AWS_ENDPOINT_OVERRIDE:}
  s3:
    bucket-name: ${S3_BUCKET_NAME:documents-inventory-s3}
    view-url-expiry-minutes: ${S3_VIEW_URL_EXPIRY_MINUTES:5}
  dynamodb:
    document-table-name: ${DYNAMODB_DOCUMENT_TABLE_NAME:DocumentInventory}
    review-queue-index-name: ${DYNAMODB_REVIEW_QUEUE_INDEX_NAME:GSI2}

jwt:
  issuer: ${JWT_ISSUER:document-platform}
  secret: ${JWT_SECRET:change-this-secret}

audit:
  read-events-enabled: ${AUDIT_READ_EVENTS_ENABLED:false}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Emits structured JSON logs with trace/span correlation for centralized log analysis.
logging:
  level:
    root: ${LOG_LEVEL:INFO}
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss}","level":"%p","service":"document-review-service","traceId":"%X{traceId}","spanId":"%X{spanId}","message":"%msg"}%n'
