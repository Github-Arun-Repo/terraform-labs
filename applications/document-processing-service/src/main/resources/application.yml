server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: ${APP_NAME:document-processing-service}

# Exposes operational endpoints used by probes, dashboards, and troubleshooting tools.
management:
  # Publishes selected actuator endpoints over HTTP so health and telemetry can be scraped.
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  # Enables endpoint-specific behavior for richer readiness and metric publishing.
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
  # Adds consistent labels to all metrics so dashboards can filter by service and environment.
  metrics:
    tags:
      application: document-processing-service
      environment: ${ENVIRONMENT:local}
  # Samples all traces in local/dev to make end-to-end request paths easy to inspect.
  tracing:
    sampling:
      probability: 1.0

aws:
  region: ${AWS_REGION:eu-central-1}
  endpoint-override: ${AWS_ENDPOINT_OVERRIDE:}
  s3:
    bucket-name: ${S3_BUCKET_NAME:documents-inventory-s3}
  sqs:
    queue-url: ${DOCUMENT_INGESTION_QUEUE_URL:http://localhost:4566/000000000000/document-ingestion-queue}
    wait-time-seconds: ${DOCUMENT_INGESTION_SQS_WAIT_TIME_SECONDS:10}
    max-messages: ${DOCUMENT_INGESTION_SQS_MAX_MESSAGES:5}
  dynamodb:
    table-name: ${DYNAMODB_DOCUMENT_TABLE_NAME:DocumentInventory}
    s3-key-index-name: ${DYNAMODB_S3_KEY_INDEX_NAME:GSI1}

processing:
  max-processing-attempts: ${MAX_PROCESSING_ATTEMPTS:3}
  processing-stale-timeout-minutes: ${PROCESSING_STALE_TIMEOUT_MINUTES:10}
  extractor-mode: ${EXTRACTOR_MODE:MOCK}
  allowed-content-types:
    - application/pdf
    - image/png
    - image/jpeg
    - image/tiff
  max-file-size-bytes: ${MAX_FILE_SIZE_BYTES:20971520}

# Emits structured JSON logs with trace/span correlation for centralized log analysis.
logging:
  level:
    root: ${LOG_LEVEL:INFO}
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss}","level":"%p","service":"document-processing-service","traceId":"%X{traceId}","spanId":"%X{spanId}","message":"%msg"}%n'
