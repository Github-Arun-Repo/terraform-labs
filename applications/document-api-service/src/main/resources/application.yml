server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: ${APP_NAME:document-api-service}

# Exposes operational endpoints used by probes, dashboards, and troubleshooting tools.
management:
  # Publishes selected actuator endpoints over HTTP so health and telemetry can be scraped.
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  # Enables endpoint-specific behavior for richer readiness and metric publishing.
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
      probes:
        enabled: ${MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED:true}
  # Adds consistent labels to all metrics so dashboards can filter by service and environment.
  metrics:
    tags:
      application: document-api-service
      environment: ${ENVIRONMENT:local}
  # Samples all traces in local/dev to make end-to-end request paths easy to inspect.
  tracing:
    sampling:
      probability: 1.0
    baggage:
      remote-fields: correlationId
      correlation:
        fields: correlationId
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector.observability.svc.cluster.local:4318}
    metrics:
      export:
        enabled: ${MANAGEMENT_OTLP_METRICS_ENABLED:true}
        url: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector.observability.svc.cluster.local:4318}/v1/metrics}

aws:
  region: ${AWS_REGION:eu-central-1}
  endpoint-override: ${AWS_ENDPOINT_OVERRIDE:}
  dynamodb:
    table-name: ${DYNAMODB_DOCUMENT_TABLE_NAME:DocumentInventory}
    customer-index-name: ${DYNAMODB_CUSTOMER_INDEX_NAME:GSI1}
    review-index-name: ${DYNAMODB_REVIEW_INDEX_NAME:GSI2}
  s3:
    bucket-name: ${S3_BUCKET_NAME:documents-inventory-s3}
    upload-url-expiry-minutes: ${S3_UPLOAD_URL_EXPIRY_MINUTES:10}
    view-url-expiry-minutes: ${S3_VIEW_URL_EXPIRY_MINUTES:5}

jwt:
  issuer: ${JWT_ISSUER:document-platform}
  secret: ${JWT_SECRET:very-strong-secret-key-please-change}
  public-key-path: ${JWT_PUBLIC_KEY_PATH:/etc/secrets/jwt/public.pem}

document:
  max-file-size-bytes: 20971520
  allowed-content-types:
    - application/pdf
    - image/png
    - image/jpeg
    - image/tiff

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Emits structured JSON logs with trace/span correlation for centralized log analysis.
logging:
  level:
    root: ${LOG_LEVEL:INFO}
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss}","level":"%p","service":"document-api-service","traceId":"%X{traceId}","spanId":"%X{spanId}","correlationId":"%X{correlationId}","message":"%msg"}%n'
