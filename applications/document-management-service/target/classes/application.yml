server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/document_mgmt}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  security:
    jwt-secret: ${JWT_SECRET:ReplaceThisWithAtLeast32ByteSecretKeyForJwt123}
    jwt-expiration-minutes: 60
  documents:
    max-size-bytes: 10485760
    allowed-types: PDF,PNG,JPEG,JPG,DOCX,TXT
