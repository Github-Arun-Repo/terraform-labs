replicaCount: 2

image:
  repository: your-account-id.dkr.ecr.your-region.amazonaws.com/document-processor
  tag: "REPLACED_BY_CI"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: "document-processor"

serviceAccount:
  create: true
  name: document-processor
  annotations:
    # TODO: set from terraform output once document-processor IRSA role is added
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/document-processor-irsa

podAnnotations: {}
podLabels: {}

revisionHistoryLimit: 10

deploymentStrategy:
  maxSurge: 25%
  maxUnavailable: 25%

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector: {}
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector: {}

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

probes:
  startup:
    path: /actuator/health/readiness
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 20
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3

networkPolicy:
  enabled: true
  allowedIngressNamespaces:
    - ingress-nginx
    - kube-system
  prometheusNamespace: monitoring
  dnsNamespace: kube-system
  observabilityNamespace: observability
  # External TCP egress: AWS service endpoints over 443 and RDS PostgreSQL over 5432.
  egressPorts:
    - 443
    - 5432

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1

serviceMonitor:
  enabled: true

env:
  - name: SERVER_PORT
    value: "8080"
  - name: DOCUMENTS_S3_BUCKET
    value: "documents-inventory-s3"
  - name: MAX_UPLOAD_FILE_SIZE_BYTES
    value: "10485760"
  - name: MULTIPART_MAX_FILE_SIZE
    value: "10MB"
  - name: MULTIPART_MAX_REQUEST_SIZE
    value: "10MB"
  - name: ALLOWED_EXTENSIONS
    value: "PDF,PNG,JPEG,JPG"
  - name: ALLOWED_CONTENT_TYPES
    value: "application/pdf,image/png,image/jpeg"

nodeSelector: {}
tolerations: []
affinity: {}
