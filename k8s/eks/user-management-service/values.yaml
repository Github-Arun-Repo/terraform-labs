replicaCount: 2

nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

revisionHistoryLimit: 10

deploymentStrategy:
  maxSurge: 25%
  maxUnavailable: 25%

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector: {}
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector: {}

image:
  repository: your-account-id.dkr.ecr.your-region.amazonaws.com/user-management-service
  tag: "REPLACED_BY_CI"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: user-management-service
  annotations:
    # TODO: set from terraform output once user-management-service IRSA role is added
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/user-management-service-irsa

service:
  type: ClusterIP
  port: 80
  targetPort: 8081

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

probes:
  startup:
    path: /actuator/health/readiness
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 20
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3

networkPolicy:
  enabled: true
  allowedIngressNamespaces:
    - ingress-nginx
    - kube-system
  prometheusNamespace: monitoring
  dnsNamespace: kube-system
  observabilityNamespace: observability
  # External TCP egress: AWS service endpoints over 443 and RDS PostgreSQL over 5432.
  egressPorts:
    - 443
    - 5432

env:
  - name: SERVER_PORT
    value: "8081"
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: "http://otel-collector.observability.svc.cluster.local:4318"
  - name: MANAGEMENT_OTLP_METRICS_ENABLED
    value: "true"
  - name: SPRING_DATASOURCE_URL
    value: "REPLACE_ME"
  - name: SPRING_DATASOURCE_USERNAME
    value: "doc_user"
  - name: AWS_DB_PASSWORD_SECRET_NAME
    value: "REPLACE_WITH_TERRAFORM_RDS_SECRET_ARN_OR_NAME"

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1
