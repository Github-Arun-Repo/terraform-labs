replicaCount: 2

image:
  repository: your-account-id.dkr.ecr.your-region.amazonaws.com/user-management-service
  tag: latest
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: user-management-service
  annotations: {}

service:
  type: ClusterIP
  port: 80
  targetPort: 8081

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  - name: SERVER_PORT
    value: "8081"
  - name: SPRING_DATASOURCE_URL
    value: "REPLACE_ME"
  - name: SPRING_DATASOURCE_USERNAME
    value: "doc_user"

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1
