replicaCount: 2

nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

revisionHistoryLimit: 10

deploymentStrategy:
  maxSurge: 25%
  maxUnavailable: 25%

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector: {}
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector: {}

image:
  repository: your-account-id.dkr.ecr.your-region.amazonaws.com/document-api-service
  tag: "REPLACED_BY_CI"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: document-api-service
  annotations:
    # TODO: set from terraform output document_api_service_role_arn
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/document-api-service-irsa

service:
  type: ClusterIP
  port: 80
  targetPort: 8082

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

probes:
  startup:
    path: /actuator/health/readiness
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 20
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3

networkPolicy:
  enabled: false
  allowedIngressNamespaces:
    - ingress-nginx
    - kube-system
  prometheusNamespace: monitoring

env:
  - name: SERVER_PORT
    value: "8082"
  - name: AWS_REGION
    value: "eu-central-1"
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: "http://otel-collector.observability.svc.cluster.local:4318"
  - name: MANAGEMENT_OTLP_METRICS_ENABLED
    value: "true"
  - name: DYNAMODB_DOCUMENT_TABLE_NAME
    value: "DocumentInventory"
  - name: DYNAMODB_CUSTOMER_INDEX_NAME
    value: "GSI1"
  - name: DYNAMODB_REVIEW_INDEX_NAME
    value: "GSI2"
  - name: S3_BUCKET_NAME
    value: "documents-inventory-s3"

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1
