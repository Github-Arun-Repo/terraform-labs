replicaCount: 2

image:
  repository: your-account-id.dkr.ecr.your-region.amazonaws.com/document-management-service
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: "document-management-service"

serviceAccount:
  create: false
  name: ""

podAnnotations: {}
podLabels: {}

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  - name: SPRING_PROFILES_ACTIVE
    value: eks
  - name: SERVER_PORT
    value: "8080"

nodeSelector: {}
tolerations: []
affinity: {}