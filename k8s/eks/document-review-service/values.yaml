replicaCount: 2

image:
  repository: your-account-id.dkr.ecr.your-region.amazonaws.com/document-review-service
  tag: latest
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: document-review-service
  annotations: {}

service:
  type: ClusterIP
  port: 80
  targetPort: 8084

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  - name: SERVER_PORT
    value: "8084"
  - name: AWS_REGION
    value: "eu-central-1"
  - name: DYNAMODB_DOCUMENT_TABLE_NAME
    value: "DocumentInventory"
  - name: DYNAMODB_REVIEW_QUEUE_INDEX_NAME
    value: "GSI2"
  - name: S3_BUCKET_NAME
    value: "documents-inventory-s3"

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1
