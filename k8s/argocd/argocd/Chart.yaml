apiVersion: v2
name: argocd
description: >
  Wrapper chart that deploys ArgoCD (Argo CD) into the EKS cluster using the
  official Argo Helm chart.  Mirrors the pattern used by the dynamic-jenkins chart.
type: application
version: 0.1.0
appVersion: "2.13.3"

dependencies:
  - name: argo-cd
    version: ">=7.0.0 <8.0.0"
    repository: https://argoproj.github.io/argo-helm
