apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: {{ .Values.nodePool.name }}
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: {{ .Values.ec2NodeClass.name }}
      requirements:
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values:
            {{- toYaml .Values.nodePool.requirements.instanceCategories | nindent 12 }}
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            {{- toYaml .Values.nodePool.requirements.capacityTypes | nindent 12 }}
  limits:
    cpu: {{ .Values.nodePool.limits.cpu | quote }}
    memory: {{ .Values.nodePool.limits.memory | quote }}
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 30s
