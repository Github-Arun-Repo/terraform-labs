apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow latest tag
    policies.kyverno.io/category: Supply Chain
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: {{ .Values.policyValidationFailureAction }}
  background: true
  rules:
    - name: check-container-image-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                {{- toYaml .Values.excludedNamespaces | nindent 16 }}
      validate:
        message: Container images must not use mutable :latest tags.
        foreach:
          - list: request.object.spec.containers
            deny:
              conditions:
                any:
                  - key: "{{`{{ contains(element.image, ':latest') }}`}}"
                    operator: Equals
                    value: true
