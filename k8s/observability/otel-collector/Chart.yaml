apiVersion: v2
name: otel-collector
description: >
  Self-contained OpenTelemetry Collector for the document platform. Receives OTLP
  traces and metrics from the Spring Boot services on ports 4317/4318, forwards
  traces to Grafana Tempo, and exposes OTLP-sourced metrics for Prometheus scraping.
  Deployed into the `observability` namespace.
type: application
version: 0.1.0
appVersion: "0.109.0"
