apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: terraform-labs
    app.kubernetes.io/component: telemetry-pipeline
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
    - name: prom-export
      port: 8889
      targetPort: prom-export
    - name: telemetry
      port: 8888
      targetPort: telemetry
{{- if .Values.serviceMonitor.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: otel-collector
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: terraform-labs
    app.kubernetes.io/component: telemetry-pipeline
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  endpoints:
    - port: prom-export
      interval: {{ .Values.serviceMonitor.interval }}
      path: /metrics
    - port: telemetry
      interval: {{ .Values.serviceMonitor.interval }}
      path: /metrics
{{- end }}
